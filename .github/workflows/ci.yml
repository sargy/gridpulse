name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend – Lint, Test & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  backend:
    name: Backend – Compile & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build & Test
        run: mvn verify -B

  # ── Security Scanning ──

  npm-audit:
    name: Security – npm audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

  maven-dependency-check:
    name: Security – Maven dependency check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: OWASP Dependency-Check
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: >
          mvn org.owasp:dependency-check-maven:check
          -DfailBuildOnCVSS=9
          ${NVD_API_KEY:+-DnvdApiKey=$NVD_API_KEY}
          -B
        continue-on-error: ${{ secrets.NVD_API_KEY == '' }}

  secret-scan:
    name: Security – Secret scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog secret scan
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  trivy-scan:
    name: Security – Container scan
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    steps:
      - uses: actions/checkout@v4

      - name: Build frontend image
        run: docker build -t gridpulse-frontend:ci ./frontend

      - name: Build backend image
        run: docker build -t gridpulse-backend:ci ./backend

      - name: Scan frontend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: gridpulse-frontend:ci
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: CRITICAL

      - name: Scan backend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: gridpulse-backend:ci
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: CRITICAL

  codeql:
    name: Security – CodeQL analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript, java-kotlin

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build backend for CodeQL
        working-directory: backend
        run: mvn compile -B -DskipTests

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3

  # ── Docker Build (non-security, kept from before) ──

  docker-build:
    name: Docker – Verify Builds
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    steps:
      - uses: actions/checkout@v4

      - name: Build frontend image
        run: docker build -t gridpulse-frontend:ci ./frontend

      - name: Build backend image
        run: docker build -t gridpulse-backend:ci ./backend
