name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend – Lint, Test & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  backend:
    name: Backend – Compile & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build & Test
        run: mvn verify -B

  docker-build:
    name: Docker – Verify Builds
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    steps:
      - uses: actions/checkout@v4

      - name: Build frontend image
        run: docker build -t gridpulse-frontend:ci ./frontend

      - name: Build backend image
        run: docker build -t gridpulse-backend:ci ./backend
